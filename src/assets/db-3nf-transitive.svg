<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 190" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a8a96"/>
    </marker>
    <marker id="arrowWarn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9480f"/>
    </marker>
  </defs>

  <!-- boxes -->
  <g>
    <rect x="30" y="40" width="150" height="56" rx="9" fill="#eef0ff" stroke="#4f46e5" stroke-width="1.6"/>
    <text x="105" y="65" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2330">직원ID</text>
    <text x="105" y="84" text-anchor="middle" font-size="12" fill="#5b5fb0">기본키</text>
  </g>
  <g>
    <rect x="285" y="40" width="150" height="56" rx="9" fill="#f7f7fb" stroke="#cfd0db" stroke-width="1.4"/>
    <text x="360" y="65" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2330">부서ID</text>
    <text x="360" y="84" text-anchor="middle" font-size="12" fill="#80828f">비주요 속성</text>
  </g>
  <g>
    <rect x="540" y="40" width="150" height="56" rx="9" fill="#f7f7fb" stroke="#cfd0db" stroke-width="1.4"/>
    <text x="615" y="65" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2330">부서명</text>
    <text x="615" y="84" text-anchor="middle" font-size="12" fill="#80828f">비주요 속성</text>
  </g>

  <!-- direct dependencies -->
  <line x1="186" y1="68" x2="278" y2="68" stroke="#8a8a96" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="441" y1="68" x2="533" y2="68" stroke="#8a8a96" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- transitive dependency arc -->
  <path d="M105,98 Q360,184 615,98" fill="none" stroke="#d9480f" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowWarn)"/>
  <rect x="232" y="135" width="256" height="22" rx="4" fill="#ffffff"/>
  <text x="360" y="151" text-anchor="middle" font-size="13" font-weight="600" fill="#d9480f">이행적 함수적 종속 : 직원ID → 부서명</text>
</svg>
