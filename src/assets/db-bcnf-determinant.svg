<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 175" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9480f"/>
    </marker>
  </defs>

  <text x="360" y="28" text-anchor="middle" font-size="12.5" fill="#80828f">후보키 : {학생, 과목}, {학생, 교수}</text>

  <rect x="120" y="50" width="170" height="54" rx="9" fill="#f7f7fb" stroke="#cfd0db" stroke-width="1.4"/>
  <text x="205" y="76" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2330">교수</text>
  <text x="205" y="94" text-anchor="middle" font-size="11" fill="#80828f">결정자(determinant)</text>

  <rect x="430" y="50" width="170" height="54" rx="9" fill="#f7f7fb" stroke="#cfd0db" stroke-width="1.4"/>
  <text x="515" y="83" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2330">과목</text>

  <line x1="292" y1="77" x2="428" y2="77" stroke="#d9480f" stroke-width="1.7" stroke-dasharray="6 4" marker-end="url(#arrowB)"/>
  <rect x="318" y="60" width="84" height="20" rx="4" fill="#ffffff"/>
  <text x="360" y="75" text-anchor="middle" font-size="12.5" font-weight="600" fill="#d9480f">교수 → 과목</text>

  <text x="360" y="142" text-anchor="middle" font-size="13" font-weight="600" fill="#d9480f">결정자 '교수'가 후보키가 아니다 → BCNF 위반</text>
</svg>
