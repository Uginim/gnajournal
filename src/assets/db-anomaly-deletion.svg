<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="delArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9480f"/>
    </marker>
  </defs>

  <text x="40" y="24" font-size="13" font-weight="700" fill="#1f2330">개발부의 마지막 직원(박지호)을 삭제하면…</text>

  <!-- header -->
  <rect x="40" y="36" width="80" height="34" fill="#eef0ff" stroke="#4f46e5" stroke-width="1.3"/>
  <rect x="120" y="36" width="90" height="34" fill="#f7f7fb" stroke="#cfd0db" stroke-width="1.3"/>
  <rect x="210" y="36" width="90" height="34" fill="#f7f7fb" stroke="#cfd0db" stroke-width="1.3"/>
  <rect x="300" y="36" width="90" height="34" fill="#f7f7fb" stroke="#cfd0db" stroke-width="1.3"/>
  <text x="80" y="58" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4f46e5">직원ID</text>
  <text x="165" y="58" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f2330">직원명</text>
  <text x="255" y="58" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f2330">부서명</text>
  <text x="345" y="58" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f2330">부서장</text>

  <!-- deleted row -->
  <rect x="40" y="70" width="80" height="40" fill="#f4f4f6" stroke="#cfd0db" stroke-width="1.2"/>
  <rect x="120" y="70" width="90" height="40" fill="#f4f4f6" stroke="#cfd0db" stroke-width="1.2"/>
  <rect x="210" y="70" width="90" height="40" fill="#f4f4f6" stroke="#cfd0db" stroke-width="1.2"/>
  <rect x="300" y="70" width="90" height="40" fill="#f4f4f6" stroke="#cfd0db" stroke-width="1.2"/>
  <text x="80" y="95" text-anchor="middle" font-size="14" fill="#9a9aa5">3</text>
  <text x="165" y="95" text-anchor="middle" font-size="14" fill="#9a9aa5">박지호</text>
  <text x="255" y="95" text-anchor="middle" font-size="14" fill="#9a9aa5">개발부</text>
  <text x="345" y="95" text-anchor="middle" font-size="14" fill="#9a9aa5">정부장</text>
  <line x1="48" y1="90" x2="382" y2="90" stroke="#d9480f" stroke-width="1.8"/>

  <!-- consequence -->
  <line x1="345" y1="112" x2="345" y2="140" stroke="#d9480f" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#delArrow)"/>
  <text x="255" y="160" text-anchor="middle" font-size="13" font-weight="600" fill="#d9480f">개발부(부서명·부서장) 정보도 함께 사라짐</text>
  <text x="40" y="188" font-size="12.5" font-weight="600" fill="#5b5fb0">삭제 이상: 직원을 지웠을 뿐인데 부서 정보까지 소실된다</text>
</svg>
