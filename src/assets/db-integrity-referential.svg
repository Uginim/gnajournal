<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 244" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="riOk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f9e44"/>
    </marker>
    <marker id="riBad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9480f"/>
    </marker>
  </defs>

  <!-- 회원 table (parent) -->
  <text x="40" y="24" font-size="13" font-weight="700" fill="#1f2330">회원</text>
  <rect x="40" y="36" width="110" height="36" fill="#eef0ff" stroke="#4f46e5" stroke-width="1.4"/>
  <text x="95" y="59" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">회원ID (PK)</text>
  <rect x="40" y="72" width="110" height="40" fill="#ffffff" stroke="#cfd0db" stroke-width="1.2"/>
  <text x="95" y="97" text-anchor="middle" font-size="14" fill="#1f2330">1</text>
  <rect x="40" y="112" width="110" height="40" fill="#ffffff" stroke="#cfd0db" stroke-width="1.2"/>
  <text x="95" y="137" text-anchor="middle" font-size="14" fill="#1f2330">2</text>

  <!-- 주문 table (child) -->
  <text x="400" y="24" font-size="13" font-weight="700" fill="#1f2330">주문</text>
  <rect x="400" y="36" width="90" height="36" fill="#f7f7fb" stroke="#cfd0db" stroke-width="1.3"/>
  <rect x="490" y="36" width="140" height="36" fill="#eef0ff" stroke="#4f46e5" stroke-width="1.3"/>
  <text x="445" y="59" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f2330">주문ID</text>
  <text x="560" y="59" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4f46e5">member_id (FK)</text>

  <rect x="400" y="72" width="90" height="40" fill="#ffffff" stroke="#cfd0db" stroke-width="1.2"/>
  <rect x="490" y="72" width="140" height="40" fill="#ffffff" stroke="#cfd0db" stroke-width="1.2"/>
  <text x="445" y="97" text-anchor="middle" font-size="14" fill="#1f2330">101</text>
  <text x="560" y="97" text-anchor="middle" font-size="14" font-weight="600" fill="#2f9e44">1</text>

  <rect x="400" y="112" width="90" height="40" fill="#ffffff" stroke="#cfd0db" stroke-width="1.2"/>
  <rect x="490" y="112" width="140" height="40" fill="#fff4ec" stroke="#d9480f" stroke-width="1.4"/>
  <text x="445" y="137" text-anchor="middle" font-size="14" fill="#1f2330">102</text>
  <text x="560" y="137" text-anchor="middle" font-size="14" font-weight="700" fill="#d9480f">999</text>

  <!-- references -->
  <line x1="490" y1="92" x2="152" y2="92" stroke="#2f9e44" stroke-width="1.8" marker-end="url(#riOk)"/>
  <text x="250" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#2f9e44">회원 1 존재 → 허용</text>

  <line x1="490" y1="132" x2="245" y2="132" stroke="#d9480f" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#riBad)"/>
  <text x="208" y="186" text-anchor="middle" font-size="15" font-weight="700" fill="#d9480f">✕</text>
  <text x="300" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#d9480f">회원 999 없음 → 차단</text>

  <text x="40" y="232" font-size="12.5" font-weight="600" fill="#5b5fb0">참조 무결성: 외래키는 존재하는 대상만 가리킬 수 있다</text>
</svg>
